<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338CA"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#4338CA" stroke-width="4" opacity="0.5"/>
  
  <!-- Headphone shape - left ear -->
  <path d="M140 180 C100 180 80 210 80 260 C80 310 100 340 140 340 C160 340 175 325 180 300" 
        fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Headphone shape - right ear -->
  <path d="M372 180 C412 180 432 210 432 260 C432 310 412 340 372 340 C352 340 337 325 332 300" 
        fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Headband -->
  <path d="M140 180 C140 100 180 60 256 60 C332 60 372 100 372 180" 
        fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Play button in center -->
  <circle cx="256" cy="256" r="70" fill="url(#playGrad)" filter="url(#glow)"/>
  <polygon points="230,220 230,292 300,256" fill="#F8FAFC"/>
  
  <!-- Sound waves -->
  <path d="M380 200 Q420 256 380 312" fill="none" stroke="#22C55E" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <path d="M132 200 Q92 256 132 312" fill="none" stroke="#22C55E" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Byte/text accent -->
  <rect x="200" y="380" width="112" height="8" rx="4" fill="#22C55E"/>
</svg>
